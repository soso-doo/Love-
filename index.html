<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Do you love me? 💕</title>
<style>
body{margin:0;height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;
font-family:Arial;background:linear-gradient(135deg,#ff6b88,#ffd1a8);text-align:center;direction:rtl}
h1{color:#fff}
.area{position:relative;height:220px;width:min(420px,90vw)}
button{position:absolute;padding:12px 22px;border:none;border-radius:999px;font-size:18px;cursor:pointer}
#yes{left:25%;top:100px;background:#ff2f65;color:#fff}
#no{left:55%;top:100px;background:#6c757d;color:#fff}
.msg{display:none;margin-top:12px;font-size:22px;color:#fff}
</style>
</head>
<body>

<h1 id="t">Do you love me? 💕</h1>
<input id="n" placeholder="اكتبي الاسم هنا" oninput="t.textContent=this.value?`Do you love me, ${this.value}? 💕`:`Do you love me? 💕`">

<div class="area" id="a">
  <button id="yes">نعم 💖</button>
  <button id="no">لا 😢</button>
</div>

<div class="msg" id="m"></div>

<script>
let s=18;
const y=yes,n0=no,a=document.getElementById('a'),m=document.getElementById('m'),nameInput=document.getElementById('n');

function move(e){
  e.preventDefault();
  const x=Math.random()*(a.clientWidth-n0.offsetWidth);
  const y2=Math.random()*(a.clientHeight-n0.offsetHeight);
  n0.style.left=x+"px"; n0.style.top=y2+"px";
  s+=2; y.style.fontSize=s+"px";
}

n0.onmouseover=move;
n0.ontouchstart=move;

y.onclick=()=>{
  const name=nameInput.value||"حبيبي";
  m.style.display="block";
  m.innerHTML=`كنت أدري يا ${name} 😌💖`;
  y.disabled=true; n0.disabled=true;
}
</script>

</body>
</html>
